name: Actualizar enlaces por cambio de usuario

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/actualizar-enlaces-usuario.yml'

permissions:
  contents: write

jobs:
  actualizar-enlaces:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reemplazar usuario anterior
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t archivos < <(git grep -Il 'gabriel-lsp' || true)
          if [ "${#archivos[@]}" -gt 0 ]; then
            sed -i 's/gabriel-lsp/crebe-ucayali/g' "${archivos[@]}"
          fi
          git rm --quiet .github/workflows/actualizar-enlaces-usuario.yml

      - name: Confirmar cambios
        shell: bash
        run: |
          set -euo pipefail
          if git grep -n 'gabriel-lsp'; then
            echo 'Aún existen referencias al usuario anterior.'
            exit 1
          fi

      - name: Guardar actualización
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Actualizar enlaces de gabriel-lsp a crebe-ucayali'
          git push origin main

# Activación mediante fusión controlada.